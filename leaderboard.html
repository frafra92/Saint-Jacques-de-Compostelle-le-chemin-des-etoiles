<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏆 Classement — Le Chemin des Étoiles</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#d4a843;--orl:#f0cc78;--ord:#7a5818;
  --p:#f0ebe0;--pd:#c0b090;
  --bg:#0e0900;--b1:#1c1100;--b2:#2a1804;--b3:#3a2608;--b4:#52380e;
  --rad:8px;
}
html,body{min-height:100%;font-family:'Lora',Georgia,serif;background:var(--bg);color:var(--p);}
body{padding:20px 16px 40px;}

.header{text-align:center;padding:32px 16px 24px;background:radial-gradient(ellipse at 50% 0%,#1a0e00,transparent 70%);}
.header-ico{font-size:48px;margin-bottom:12px;}
.header-titre{font-family:'Cinzel',serif;font-size:clamp(22px,5vw,38px);color:var(--orl);letter-spacing:3px;margin-bottom:6px;text-shadow:0 0 20px rgba(212,168,67,.4);}
.header-sous{font-family:'Cinzel',serif;font-size:11px;color:var(--ord);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}

.tabs{display:flex;gap:8px;justify-content:center;margin:20px 0 24px;flex-wrap:wrap;}
.tab{font-family:'Cinzel',serif;font-size:13px;padding:8px 20px;border-radius:20px;border:1px solid var(--b4);background:transparent;color:var(--ord);cursor:pointer;transition:all .2s;}
.tab.active{border-color:var(--or);color:var(--orl);background:var(--b2);}
.tab:hover{border-color:var(--or);color:var(--orl);}

.container{max-width:700px;margin:0 auto;}

.loading{text-align:center;padding:40px;color:var(--ord);font-family:'Cinzel',serif;font-size:14px;letter-spacing:2px;}
.loading .dot{animation:blink 1.2s ease-in-out infinite;}
.loading .dot:nth-child(2){animation-delay:.2s;}
.loading .dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

.error{text-align:center;padding:32px;color:#a06040;font-size:14px;border:1px solid var(--b3);border-radius:var(--rad);margin:20px 0;}

.table-header{display:grid;grid-template-columns:48px 1fr 80px 80px 80px;gap:8px;padding:10px 14px;font-family:'Cinzel',serif;font-size:10px;color:var(--ord);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--b3);margin-bottom:4px;}
.row{display:grid;grid-template-columns:48px 1fr 80px 80px 80px;gap:8px;align-items:center;padding:12px 14px;border-radius:var(--rad);border:1px solid transparent;margin-bottom:4px;transition:all .15s;}
.row:hover{background:var(--b1);border-color:var(--b3);}
.row.top1{background:linear-gradient(135deg,#1a1000,#2a1800);border-color:#a07828;}
.row.top2{background:var(--b1);border-color:#4a4040;}
.row.top3{background:var(--b1);border-color:#6a4020;}

.rank{font-family:'Cinzel',serif;font-size:16px;text-align:center;color:var(--ord);}
.rank.r1{color:#f0cc44;font-size:22px;}
.rank.r2{color:#c0c0c0;font-size:18px;}
.rank.r3{color:#cd7f32;font-size:18px;}

.nom{font-size:15px;color:var(--p);}
.ville{font-size:11px;color:var(--ord);margin-top:2px;}
.badge-pays{font-size:11px;background:var(--b3);border-radius:4px;padding:2px 6px;display:inline-block;margin-top:2px;color:var(--pd);}

.val{text-align:right;font-family:'Cinzel',serif;}
.val-score{font-size:15px;color:var(--orl);}
.val-km{font-size:13px;color:#a08050;}
.val-etapes{font-size:13px;color:var(--pd);}

.empty{text-align:center;padding:48px;color:var(--ord);font-size:14px;line-height:2;}

.retour{display:flex;gap:10px;justify-content:center;margin-top:32px;flex-wrap:wrap;}
.btn{font-family:'Cinzel',serif;font-size:14px;padding:10px 24px;border-radius:24px;border:1px solid var(--b4);background:transparent;color:var(--ord);cursor:pointer;text-decoration:none;transition:all .2s;display:inline-block;}
.btn:hover,.btn.active{border-color:var(--or);color:var(--orl);}
.btn-or{border-color:var(--or);color:var(--orl);}

.maj{text-align:center;font-size:11px;color:var(--b4);margin-top:16px;font-family:'Cinzel',serif;letter-spacing:1px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-ico">🏆</div>
  <div class="header-titre">Classement des Pèlerins</div>
  <div class="header-sous">Via Turonensis · GR655 · Paris → Santiago</div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="loadTab('FRANCE',this)">🇫🇷 France</button>
    <button class="tab" onclick="loadTab('ESPAGNE',this)">🇪🇸 Espagne</button>
    <button class="tab" onclick="loadTab('GLOBAL',this)">🌍 Global</button>
  </div>

  <div id="table-header" class="table-header" style="display:none">
    <div>#</div>
    <div>Pèlerin</div>
    <div style="text-align:right">Score</div>
    <div style="text-align:right">Km</div>
    <div style="text-align:right">Étapes</div>
  </div>

  <div id="lb-body">
    <div class="loading">Chargement<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  </div>

  <div class="maj" id="maj"></div>

  <div class="retour">
    <a href="chemin_etoiles_FRANCE.html" class="btn btn-or">🇫🇷 Jouer France</a>
    <a href="chemin_etoiles_ESPAGNE.html" class="btn">🇪🇸 Jouer Espagne</a>
    <a href="index.html" class="btn">🏠 Accueil</a>
  </div>
</div>

<script>
const APPS_URL = "https://script.google.com/macros/s/AKfycbxHAYVe2jdmzUvtLO7g0jMoiXC8sHdm-x80ofqCdoAqnvABemznoW_7EKoI3zNiMDVk/exec";

const MEDALS = ['🥇','🥈','🥉'];

async function loadTab(fichier, btn) {
  // Activer l'onglet
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const body = document.getElementById('lb-body');
  const header = document.getElementById('table-header');
  const maj = document.getElementById('maj');
  body.innerHTML = '<div class="loading">Chargement<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>';
  header.style.display = 'none';

  try {
    const url = APPS_URL + '?action=get&fichier=' + fichier;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (!data || !data.scores || data.scores.length === 0) {
      body.innerHTML = '<div class="empty">🐚 Aucun pèlerin au classement pour le moment.<br>Soyez le premier à terminer une étape !</div>';
      return;
    }

    // Trier par score décroissant
    const entries = data.scores.sort((a, b) => (b.score || 0) - (a.score || 0)).slice(0, 100);

    header.style.display = 'grid';
    body.innerHTML = entries.map((e, i) => {
      const rank = i + 1;
      const cls = rank === 1 ? 'row top1' : rank === 2 ? 'row top2' : rank === 3 ? 'row top3' : 'row';
      const rankHtml = rank <= 3
        ? `<div class="rank r${rank}">${MEDALS[i]}</div>`
        : `<div class="rank">${rank}</div>`;
      const villeHtml = e.ville ? `<div class="ville">📍 ${e.ville}${e.pays ? ' · ' + e.pays : ''}</div>` : '';
      return `<div class="${cls}">
        ${rankHtml}
        <div><div class="nom">${e.pseudo || 'Anonyme'}</div>${villeHtml}</div>
        <div class="val"><div class="val-score">${(e.score||0).toLocaleString('fr-FR')}</div><div style="font-size:10px;color:var(--ord)">pts</div></div>
        <div class="val"><div class="val-km">${e.km||0} km</div></div>
        <div class="val"><div class="val-etapes">${e.etape||0} ét.</div></div>
      </div>`;
    }).join('');

    maj.textContent = 'Mis à jour à ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});

  } catch(err) {
    body.innerHTML = `<div class="error">⚠️ Impossible de charger le classement.<br><small>${err.message}</small><br><br>Vérifiez votre connexion et réessayez.</div>`;
  }
}

// Charger France au démarrage
loadTab('FRANCE', document.querySelector('.tab.active'));
</script>
</body>
</html>
